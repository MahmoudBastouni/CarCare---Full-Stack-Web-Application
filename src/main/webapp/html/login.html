<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | CarCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="../styles/navbar.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="../images/icon_img.ico">
    <link href="../styles/login.css" rel="stylesheet">
</head>
<body>

<!-- navbar stuff -->
<nav class="navbar navbar-expand-lg sticky-top custom-nav">
    <div class="container">
        <a class="navbar-brand" href="index.html">CarCare</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item"><a class="nav-link" href="index.html#packages">Packages</a></li>
                <li class="nav-item"><a class="nav-link" href="index.html#contact">Contact</a></li>
                <li class="nav-item ms-lg-2"><a class="nav-link btn-book" href="booking.html">Book Now</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-icon">
            <i class="bi bi-shield-lock"></i>
        </div>
        <h2>Admin Login</h2>
        <p>Sign in to access the CarCare dashboard.</p>

        <div class="error-msg" id="errorMsg">
            <i class="bi bi-exclamation-circle me-2"></i>Invalid username or password.
        </div>

        <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <input type="text" class="form-control" id="username" placeholder="Enter username" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter password" required>
        </div>

        <button class="btn-login" id="loginBtn" onclick="handleLogin()">
            Sign In
        </button>
    </div>
</div>

<footer>© 2026 CarCare. All rights reserved.</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../scripts/login.js"></script>
</body>
</html>
