<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings | CarCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="../styles/navbar.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="../images/icon_img.ico">
    <link href="../styles/mybookings.css" rel="stylesheet">
</head>
<body>

<!-- navbar stuff -->
<nav class="navbar navbar-expand-lg sticky-top custom-nav">
    <div class="container">
        <a class="navbar-brand" href="index.html">CarCare</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item"><a class="nav-link" href="index.html#packages">Packages</a></li>
                <li class="nav-item"><a class="nav-link" href="index.html#contact">Contact</a></li>
                <li class="nav-item"><a class="nav-link" href="mybookings.html">My Bookings</a></li>
                <li class="nav-item ms-lg-2"><a class="nav-link btn-book" href="booking.html">Book Now</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- hero section -->
<section class="page-hero">
    <h1>My Bookings</h1>
    <p>Enter your phone number to view and manage your CarCare bookings.</p>
</section>

<!-- search and results -->
<section class="search-section">
    <div class="container">

        <!-- search box -->
        <div class="search-card">
            <h5><i class="bi bi-search me-2"></i>Find your bookings</h5>
            <p>Use the phone number you provided when booking.</p>
            <div class="d-flex gap-2">
                <input type="tel" class="form-control" id="phoneInput" placeholder="+971 50 000 0000">
                 <button class="btn-search" onclick="loadBookings()">Search</button>
            </div>
            <div id="searchError" class="text-danger small mt-2" style="display:none"></div>
        </div>

        <!-- results here -->
        <div id="resultsArea" style="max-width:700px;margin:0 auto;display:none">
            <h6 class="text-muted mb-3" id="resultsLabel"></h6>
            <div id="bookingsList"></div>
        </div>

    </div>
</section>

<footer>
    <p class="mb-1">© 2026 CarCare. All rights reserved.</p>
    <p class="mb-0"><a href="index.html">Home</a> · <a href="booking.html">Book a Service</a> · <a href="index.html#contact">Contact</a></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../scripts/mybookings.js"></script>
</body>
</html>
